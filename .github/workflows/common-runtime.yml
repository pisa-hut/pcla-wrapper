name: Common Runtime

on:
  workflow_dispatch:
    inputs:
      weights_path:
        description: Absolute path to the selected PCLA weight directory
        required: true
        default: /opt/pisa/plant_pretrained

jobs:
  common-runtime:
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build common slim image
        run: docker build --target common-slim -t pcla-wrapper:common-slim .

      - name: Validate runtime and mounted weights
        run: |
          docker run --rm --gpus all \
            -v "${{ inputs.weights_path }}:/mnt/weights:ro" \
            pcla-wrapper:common-slim \
            /app/scripts/validate_common_runtime.py --check-weights

      - name: Load default agent
        run: |
          docker run --rm --gpus all \
            -v "${{ inputs.weights_path }}:/mnt/weights:ro" \
            pcla-wrapper:common-slim \
            /app/scripts/smoke_common_agent.py carl_plant_3
